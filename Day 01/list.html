<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>

    <h1>List</h1>
        <h2>Unordered list</h2>
            <ul>
                <li>Bread</li>
                <li>Jam</li>
                <li>Frooti</li>
                <li>Samosa</li>
                <li>Biscuit</li>
                <li>Tea</li>
            </ul>
        
        <h2>Ordered List</h2>
            <ol>
                <li>Bread</li>
                <li>Jam</li>
                <li>Frooti</li>
                <li>Samosa</li>
                <li>Biscuit</li>
                <li>Tea</li>
            </ol>

            <h2>Ordered List Attribute</h2>
            <ol type="A">
                <li>Bread</li>
                <li>Jam</li>
                <li>Frooti</li>
                <li>Samosa</li>
                <li>Biscuit</li>
                <li>Tea</li>
            </ol>


    
</body>
</html>
