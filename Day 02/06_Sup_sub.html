<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sup and Sub</title>
</head>
<body>
    <!-- sup tag is used for like we have to write (a+b) to whole square -->
    <h1>
        Pythagorous theorem says a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup>
    </h1>
    <!-- sub tag is used for like we have to write the formula of glucose then we use this -->
    <h1>
        Formula of Glucose is C<sub>6</sub>H<sub>12</sub>O<sub>6</sub>
    </h1>
</body>
</html
