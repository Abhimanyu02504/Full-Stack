<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entities</title>
</head>
<body>

    <!-- if we want extra space use &nbsp; means non breaking space-->
     <h3>Abhimanyu &nbsp; Singh</h3>
    <!-- if we want to show the number is greater than or less than then use &lt; for less than &gt; for greater than-->
     <h3>10 &lt; 15</h3>
     <h3>10 &gt; 5</h3>
     <!-- if we want to print a heart then use &heart; -->
      <h2>&hearts;</h2>
      <!-- if we want to print an inverted comma the use &quot; -->
      <h3>&quot;Ram &quot;</h3>
      <!-- used to print & -->
      <h3>&amp; </h3>
      <h1>This is a &bigstar;</h1>
      <h1>The sky is cloudy &#9729; &amp; it will rain&#9748; today.</h1>
</body>
</html>
