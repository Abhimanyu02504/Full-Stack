<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline css</title>
</head>
<body>
    <h1 style="background-color: aqua;">List</h1>
        <h2 style="background-color: bisque;">Unordered list</h2>
            <ul>
                <li>Bread</li>
                <li>Jam</li>
                <li>Frooti</li>
                <li>Samosa</li>
                <li>Biscuit</li>
                <li>Tea</li>
            </ul>
        
        <h2>Ordered List</h2>
            <ol>
                <li>Bread</li>
                <li>Jam</li>
                <li>Frooti</li>
                <li>Samosa</li>
                <li>Biscuit</li>
                <li>Tea</li>
            </ol>



</body>
</html>
